name: daily

on:
  schedule:
    # 06:05 America/Los_Angeles = 13:05 UTC (DST) / 14:05 UTC (standard)
    # Using 14:05 UTC to cover both; adjust if you want strict local time.
    - cron: '5 14 * * *'
  workflow_dispatch:

permissions:
  contents: read  # dashboard is pushed to a separate repo, not committed here

jobs:
  ingest_brief_publish:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      HEALTHSTACK_SHEET_ID: ${{ secrets.HEALTHSTACK_SHEET_ID }}
      HEVY_API_KEY: ${{ secrets.HEVY_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      TIMEZONE: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt

      - name: Ingest yesterday's data
        run: python -m src.ingest

      - name: Send briefing
        run: python -m src.briefing daily

      - name: Export dashboard data
        run: python -m src.export_dashboard

      - name: Publish dashboard to separate Pages repo
        env:
          DASHBOARD_REPO: ${{ secrets.DASHBOARD_REPO }}   # e.g. payasparab/healthstack-dashboard
          DASHBOARD_PAT:  ${{ secrets.DASHBOARD_PAT }}    # PAT with contents:write on the dashboard repo
        run: |
          set -euo pipefail
          if [ -z "${DASHBOARD_REPO:-}" ] || [ -z "${DASHBOARD_PAT:-}" ]; then
            echo "DASHBOARD_REPO / DASHBOARD_PAT not set; skipping publish."
            exit 0
          fi

          # Clone the target repo into a workspace so we preserve its history.
          git clone --depth 1 \
            "https://x-access-token:${DASHBOARD_PAT}@github.com/${DASHBOARD_REPO}.git" \
            dashboard-repo
          cd dashboard-repo

          # Overwrite the site tree from the source docs/ folder + freshly
          # generated data.json. Anything else (LICENSE, README) is left alone.
          for f in index.html dashboard.css dashboard.js data.json .nojekyll; do
            src="../docs/$f"
            [ -f "$src" ] && cp "$src" "./$f"
          done

          git config user.name  "healthstack-bot"
          git config user.email "healthstack-bot@users.noreply.github.com"
          git add index.html dashboard.css dashboard.js data.json .nojekyll
          if git diff --cached --quiet; then
            echo "No dashboard changes to publish."
          else
            git commit -m "dashboard: data for $(date -u +%Y-%m-%d)"
            git push origin HEAD
          fi
